<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../Prueba2/css/index.css" />
</head>
<body class="page-auth">
  <div class="page-transition" id="pageTransition">
    <div class="transition-wave"></div>
    <div class="transition-wave wave-2"></div>
    <div class="transition-wave wave-3"></div>
  </div>

  <main class="auth-shell">
    <section class="auth-card register-mode">
      <div class="auth-visual">
        <div class="visual-bg-shape"></div>
        <div class="visual-bubbles">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </div>

        <div class="brand">
          <div class="brand-logo">T+</div>
          <div class="brand-text">
            <h2>Talento+</h2>
            <p>Plataforma de aprendizaje</p>
          </div>
        </div>

        <div class="illustration alt-illustration">
          <div class="hill hill-1"></div>
          <div class="hill hill-2"></div>

          <div class="cards-floating">
            <div class="mini-card mc1"></div>
            <div class="mini-card mc2"></div>
            <div class="mini-card mc3"></div>
          </div>

          <div class="register-orbit">
            <div class="orbit-circle oc1"></div>
            <div class="orbit-circle oc2"></div>
            <div class="orbit-center"></div>
          </div>
        </div>

        <div class="visual-footer">
          <p>Crea tu cuenta y comienza una nueva experiencia de formación.</p>
        </div>
      </div>

      <div class="auth-panel">
        <div class="panel-glow"></div>

        <div class="form-wrap">
          <span class="form-kicker">Crear cuenta</span>
          <h1>Registro</h1>
          <p class="form-subtitle">Completa los datos para registrarte.</p>

          <form action="#" method="POST" class="auth-form">
            <div class="input-group">
              <label for="nombre">Nombre completo</label>
              <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre completo" required />
            </div>

            <div class="input-group">
              <label for="correo">Correo electrónico</label>
              <input type="email" id="correo" name="correo" placeholder="Ingresa tu correo" required />
            </div>

            <div class="input-row">
              <div class="input-group">
                <label for="usuario_reg">Usuario</label>
                <input type="text" id="usuario_reg" name="usuario_reg" placeholder="Crea un usuario" required />
              </div>

              <div class="input-group">
                <label for="rol">Rol</label>
                <select id="rol" name="rol" required>
                  <option value="">Selecciona</option>
                  <option value="estudiante">Estudiante</option>
                  <option value="profesor">Profesor</option>
                  <option value="administrador">Administrador</option>
                </select>
              </div>
            </div>

            <div class="input-row">
              <div class="input-group">
                <label for="password_reg">Contraseña</label>
                <input type="password" id="password_reg" name="password_reg" placeholder="Crea una contraseña" required />
              </div>

              <div class="input-group">
                <label for="confirmar_password">Confirmar</label>
                <input type="password" id="confirmar_password" name="confirmar_password" placeholder="Confirma la contraseña" required />
              </div>
            </div>

            <button type="submit" class="btn-primary">Crear cuenta</button>
          </form>

          <div class="switch-auth">
            <span>¿Ya tienes una cuenta?</span>
            <a href="index.html" class="nav-transition">Inicia sesión aquí</a>
          </div>

          <div class="legal-links">
            <a href="#">Términos y condiciones</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="../Prueba2/js/login.js"></script>
</body>
</html>
