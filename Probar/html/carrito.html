<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaElectro | Carrito</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/menu_principal.css">
  <link rel="stylesheet" href="../css/carrito.css">
</head>
<body>

  <main class="cart-page">
    <div class="cart-wrap">

      <div class="cart-head">
        <div>
          <!-- ✅ MEJORA: Volver a inicio visible arriba -->
          <a class="btn-outline" href="menu_principal.html">← Volver a inicio</a>

          <h1 style="margin-top:12px;">Tu carrito</h1>
          <p>Productos listos para comprar.</p>
        </div>

        <button class="btn-outline" id="clearCartBtn" type="button">Vaciar</button>
      </div>

      <div class="cart-grid">
        <section class="cart-list" id="cartList"></section>

        <aside class="cart-summary">
          <h3>Resumen</h3>

          <div class="sum-row">
            <span>Subtotal</span>
            <strong id="sumSubtotal">$0</strong>
          </div>

          <div class="sum-row">
            <span>Envío</span>
            <strong id="sumShipping">$0</strong>
          </div>

          <div class="sum-row total">
            <span>Total</span>
            <strong id="sumTotal">$0</strong>
          </div>

          <button class="btn-solid checkout" id="checkoutBtn" type="button">Ir a pagar</button>

          <p class="sum-note">Al continuar aceptas nuestras condiciones de compra.</p>
        </aside>
      </div>

    </div>
  </main>

  

  <script src="../js/cart_core.js"></script>
  <script src="../js/carrito.js"></script>
</body>
</html>
