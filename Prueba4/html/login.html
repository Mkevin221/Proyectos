<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión | MoneyTrack</title>
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-left">
      <div class="brand-box">
        <div class="logo-circle">$</div>
        <h1>MoneyTrack</h1>
        <p>Controla tus gastos, metas, presupuesto e inversiones en una sola plataforma.</p>
      </div>
    </div>

    <div class="auth-right">
      <div class="auth-card">
        <div class="auth-header">
          <h2>Bienvenido</h2>
          <p>Inicia sesión para entrar a tu panel financiero.</p>
        </div>

        <form class="auth-form" id="loginForm">
          <div class="field">
            <label for="correo">Correo electrónico</label>
            <input type="email" id="correo" placeholder="ejemplo@correo.com" required />
          </div>

          <div class="field">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" required />
          </div>

          <div class="options-row">
            <label class="check-label">
              <input type="checkbox" />
              <span>Recordarme</span>
            </label>
          </div>

          <button type="submit" class="primary-btn">Iniciar sesión</button>
          <div id="authMessage" class="auth-message"></div>
        </form>

        <div class="auth-footer">
          <p>¿No tienes cuenta? <a href="registro.html">Crear cuenta</a></p>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/auth.js"></script>
</body>
</html>
